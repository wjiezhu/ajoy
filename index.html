
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JOY WEI JIEZHUO | ARCHIVE</title>
    
    <!-- 基础样式：确保在 Tailwind 加载前页面也有基本外观 -->
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: #111111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        cursor: none; /* 保持隐藏原生光标 */
        overflow-x: hidden;
      }
      
      /* 初始加载时的居中文字 */
      .init-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 0; /* 在 React root 之下 */
        font-size: 10px;
        letter-spacing: 0.2em;
        color: #C06C59; /* Terracotta */
        font-weight: bold;
        text-transform: uppercase;
      }

      /* 自定义光标样式 */
      .custom-cursor {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: 12px;
        height: 12px;
        background: #C06C59;
        border-radius: 50%;
        transform: translate(-50%, -50%); /* 居中定位 */
      }
      .custom-cursor-outline {
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(192, 108, 89, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%); /* 居中定位 */
        transition: all 0.1s ease-out;
      }
    </style>

    <!-- Tailwind CDN：这是你目前唯一的样式来源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', '"Noto Serif SC"', 'Georgia', 'serif'],
              sans: ['"Inter"', '"Noto Sans SC"', 'Helvetica', 'Arial', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              'paper-white': '#FFFFFF',
              'ink-black': '#111111',
              'terracotta': '#C06C59',
            },
            animation: { 
              'spin-slow': 'spin 8s linear infinite',
            }
          }
        }
      }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+SC:wght@300;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- 
      CRITICAL FIX: 移除了 importmap。
      Vite 在构建时会自动处理 npm 包的依赖。
      浏览器不需要 importmap，也不需要去 esm.sh 下载 React。
    -->
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  
  <body>
    <!-- 初始加载提示，React 挂载后会覆盖它，或者背景色会盖住它 -->
    <div class="init-loader">SYSTEM INITIALIZING...</div>

    <!-- React 挂载点 -->
    <div id="root" style="position: relative; z-index: 1;"></div>

    <!-- 光标 DOM -->
    <div id="cursor" class="custom-cursor hidden md:block"></div>
    <div id="cursor-outline" class="custom-cursor-outline hidden md:block"></div>

    <!-- 
      Vite Entry Point 
      注意：使用 /index.tsx 而不是 ./index.tsx，这是 Vite 的标准约定。
    -->
    <script type="module" src="/index.tsx"></script>

    <!-- 原生光标脚本 -->
    <script>
      const cursor = document.getElementById('cursor');
      const cursorOutline = document.getElementById('cursor-outline');
      
      if (window.matchMedia("(min-width: 768px)").matches && cursor && cursorOutline) {
        document.addEventListener('mousemove', (e) => {
          // 使用 left/top 配合 CSS transform translate(-50%, -50%) 实现精准中心对齐
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
          
          cursorOutline.animate({
            left: e.clientX + 'px',
            top: e.clientY + 'px'
          }, { duration: 500, fill: "forwards" });
        });
      }
    </script>
  </body>
</html>
