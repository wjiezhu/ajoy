            fontFamily: {
              serif: ['"Playfair Display"', '"Noto Serif SC"', 'Georgia', 'serif'],
              sans: ['"Inter"', '"Noto Sans SC"', 'Helvetica', 'Arial', 'sans-serif'],

            },

              'paper-white': '#FFFFFF',
              'ink-black': '#111111',
              'caption-grey': '#666666',

              'terracotta': '#C06C59',

            },

              'fade-in': 'fadeIn 1.5s cubic-bezier(0.2, 0, 0.2, 1) forwards',

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400&family=Noto+Serif+SC:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body { 
        cursor: none; 
        background-color: #FFFFFF; 
        -webkit-font-smoothing: antialiased; 
        overflow-x: hidden; 
        margin: 0; 
      }
      ::selection { background: #111111; color: white; }
      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #111111; }
      
      #root { min-height: 100vh; }

      .custom-cursor {
        width: 12px;
        height: 12px;
        background: #C06C59;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transition: transform 0.15s ease-out, opacity 0.3s ease;
        mix-blend-mode: normal;
      }
      
      .custom-cursor-outline {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(192, 108, 89, 0.3);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        transition: transform 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .hover-active .custom-cursor { transform: scale(3); opacity: 0.15; }
      .hover-active .custom-cursor-outline { transform: scale(1.5); border-color: #C06C59; }

      .writing-vertical { writing-mode: vertical-rl; }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <div id="cursor" class="custom-cursor hidden md:block"></div>
    <div id="cursor-outline" class="custom-cursor-outline hidden md:block"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      const cursor = document.getElementById('cursor');
      const cursorOutline = document.getElementById('cursor-outline');
      
      // Ensure elements exist before adding listeners to prevent errors
      if (cursor && cursorOutline) {
        document.addEventListener('mousemove', (e) => {
          cursor.style.left = e.clientX - 6 + 'px';
          cursor.style.top = e.clientY - 6 + 'px';
          
          cursorOutline.animate({
            left: e.clientX - 20 + 'px',
            top: e.clientY - 20 + 'px'
          }, { duration: 500, fill: 'forwards' });
        });

        document.addEventListener('mouseover', (e) => {
          if (e.target.closest('a, button, [role="button"], .interactive')) {
            document.body.classList.add('hover-active');
          }
        });

        document.addEventListener('mouseout', (e) => {
          if (e.target.closest('a, button, [role="button"], .interactive')) {
            document.body.classList.remove('hover-active');
          }
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
