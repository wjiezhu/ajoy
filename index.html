<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JOY WEI JIEZHUO | ARCHIVE</title>
    
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: #111111;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        cursor: none;
        overflow-x: hidden;
      }
      
      /* Loader: 确保它在最底层，但初始化时可见 */
      .init-loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 0; 
        font-size: 10px;
        letter-spacing: 0.2em;
        color: #C06C59;
        font-weight: bold;
        text-transform: uppercase;
        background-color: #ffffff;
      }

      .custom-cursor {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: 12px;
        height: 12px;
        background: #C06C59;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      .custom-cursor-outline {
        position: fixed;
        pointer-events: none;
        z-index: 9998;
        width: 40px;
        height: 40px;
        border: 1px solid rgba(192, 108, 89, 0.3);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        transition: all 0.1s ease-out;
      }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', '"Noto Serif SC"', 'Georgia', 'serif'],
              sans: ['"Inter"', '"Noto Sans SC"', 'Helvetica', 'Arial', 'sans-serif'],
              mono: ['"JetBrains Mono"', 'monospace'],
            },
            colors: {
              'paper-white': '#FFFFFF',
              'ink-black': '#111111',
              'terracotta': '#C06C59',
            },
            animation: { 
              'spin-slow': 'spin 8s linear infinite',
            }
          }
        }
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+SC:wght@300;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <!-- 
      CLEAN ARCHITECTURE:
      Importmap has been removed. 
      The system now relies entirely on the Vite bundler to link App modules 
      and dependencies, ensuring compatibility with GitHub Pages (via .nojekyll).
    -->
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  
  <body>
    <!-- 加载文字 -->
    <div id="loader" class="init-loader">SYSTEM INITIALIZING...</div>

    <!-- React 挂载点：z-index 10 确保加载后覆盖文字 -->
    <div id="root" style="position: relative; z-index: 10; min-height: 100vh;"></div>

    <!-- Cursor -->
    <div id="cursor" class="custom-cursor hidden md:block"></div>
    <div id="cursor-outline" class="custom-cursor-outline hidden md:block"></div>

    <!-- Entry Point -->
    <script type="module" src="/index.tsx"></script>

    <script>
      // 增强的光标逻辑
      const cursor = document.getElementById('cursor');
      const cursorOutline = document.getElementById('cursor-outline');
      
      if (window.matchMedia("(min-width: 768px)").matches && cursor && cursorOutline) {
        document.addEventListener('mousemove', (e) => {
          cursor.style.left = e.clientX + 'px';
          cursor.style.top = e.clientY + 'px';
          
          cursorOutline.animate({
            left: e.clientX + 'px',
            top: e.clientY + 'px'
          }, { duration: 500, fill: "forwards" });
        });
      }
      
      // 安全网：如果 3秒后 React 还没加载（通常不会发生），手动隐藏 loader 避免遮挡报错信息（虽然通常是在控制台）
      setTimeout(() => {
        const loader = document.getElementById('loader');
        if (loader && document.getElementById('root').childElementCount > 0) {
           loader.style.display = 'none';
        }
      }, 3000);
    </script>
  </body>
</html>
